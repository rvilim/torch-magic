# Anelastic hydrodynamic benchmark (Jones et al.)
# strat=5, polind=2, mode=1 (no magnetic field)
# Stress-free BCs, AM corrections, gravity ∝ r_cmb²/r²
# Config for Modal cloud GPU runs

# Grid
l_max: 144
n_r_max: 97
n_cheb_max: 95
minc: 1

# Anelastic physics
mode: 1
strat: 5.0
polind: 2.0
g0: 0.0
g1: 0.0
g2: 1.0
ra: 1.48638035e5
ek: 1.0e-3
pr: 1.0

# Boundary conditions (stress-free)
ktopv: 1
kbotv: 1

# Angular momentum corrections
l_correct_AMz: true
l_correct_AMe: true

# Initial condition
init_s1: 1919
amp_s1: 0.01

# Time stepping
alpha: 0.6
n_steps: 100000
dt: 1.0e-4

# Output
output_dir: ./output/anel_bench
log_every: 10
checkpoint_every: 1000

# Device
device: cuda

# Restart (optional)
restart: null
